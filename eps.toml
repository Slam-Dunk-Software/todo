[package]
name        = "todo"
version     = "0.1.0"
description = "A minimal task manager EPS — add, complete, delete, list."
authors     = ["nickagliano"]
license     = "MIT"
repository  = "https://github.com/Slam-Dunk-Software/todo"
platform    = ["aarch64-apple-darwin", "x86_64-apple-darwin", "x86_64-unknown-linux-gnu"]

[service]
enabled      = true
start        = "todo serve --port 8765"
port         = 8765
health_check = "GET /health"
